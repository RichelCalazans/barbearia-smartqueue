name: Deploy to Firebase Hosting

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x] # 1. Atualizado para o Node mais moderno e estável

    steps:
      - uses: actions/checkout@v4 # 2. Atualizado de v3 para v4 (elimina o aviso do Node 20)

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4 # 2. Atualizado de v3 para v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install # 3. Substituído 'npm ci' por 'npm install' para forçar o download dos binários do Linux

      - name: Build
        run: npm run build

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          rebaseConflicts: true
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: ${{ secrets.FIREBASE_PROJECT_ID }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}